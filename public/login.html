<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login · BitVault Mining</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161f;
            --border: #252535;
            --gold: #f7931a;
            --gold-light: #ffb347;
            --grad: linear-gradient(135deg, #f7931a, #ffb347);
            --text: #e8e8f0;
            --muted: #a0a0b8;
            --radius: 16px;
            --transition: 0.3s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px; background-image: radial-gradient(circle at 70% 30%, #f7931a08, transparent 60%);
        }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 40px 32px; width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; font-size: 2.5rem; margin-bottom: 20px; }
        h2 { text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; }
        input {
            width: 100%; padding: 14px 16px; border-radius: 10px; background: #0a0a12;
            border: 1px solid var(--border); color: #fff; font-size: 1rem; transition: var(--transition);
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 10px #f7931a30; }
        .btn {
            width: 100%; padding: 14px; border-radius: 50px; border: none;
            background: var(--grad); color: #0a0a0f; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 20px #f7931a30;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px #f7931a50; }
        .register-link { text-align: center; margin-top: 24px; color: var(--muted); font-size: 0.9rem; }
        .register-link a { color: var(--gold); text-decoration: none; font-weight: 600; }
        .error-msg { color: #ff4757; font-size: 0.85rem; margin-top: 8px; display: none; }
        .loading-spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(0,0,0,0.3); border-top-color: #0a0a0f;
            border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">⛏️</div>
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email or Phone Number</label>
                <input type="text" name="login" id="loginInput" placeholder="you@example.com or +123..." required autofocus>
            </div>
            <div class="form-group">
                <label>6‑Digit PIN</label>
                <input type="password" name="pin" id="pinInput" maxlength="6" minlength="6" pattern="\d{6}" placeholder="******" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <button type="submit" class="btn" id="loginBtn">
                <span class="btn-text">Login to Dashboard</span>
                <span class="loading-spinner" style="display:none;" id="spinner"></span>
            </button>
        </form>
        <div class="register-link">Don't have an account? <a href="register.html">Register here</a></div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMsg');
        const btn = document.getElementById('loginBtn');
        const spinner = document.getElementById('spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const login = document.getElementById('loginInput').value.trim();
            const pin = document.getElementById('pinInput').value;
            errorDiv.style.display = 'none';

            if (pin.length !== 6) {
                errorDiv.textContent = 'PIN must be exactly 6 digits.';
                errorDiv.style.display = 'block';
                return;
            }

            // Show loading
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btn.querySelector('.btn-text').textContent = 'Logging in...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, pin })
                });
                const data = await res.json();

                if (data.success) {
                    // Store token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('minerUser', JSON.stringify(data.user));

                    // Redirect based on role
                    if (data.user.isAdmin) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorDiv.textContent = data.message || 'Invalid credentials.';
                    errorDiv.style.display = 'block';
                    // Reset button
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    btn.querySelector('.btn-text').textContent = 'Login to Dashboard';
                }
            } catch (err) {
                errorDiv.textContent = 'Server error. Please try again later.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                spinner.style.display = 'none';
                btn.querySelector('.btn-text').textContent = 'Login to Dashboard';
            }
        });
    </script>
</body>
</html>
