<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Create Account · BitVault Mining</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161f;
            --border: #252535;
            --gold: #f7931a;
            --gold-light: #ffb347;
            --grad: linear-gradient(135deg, #f7931a, #ffb347);
            --text: #e8e8f0;
            --muted: #a0a0b8;
            --radius: 14px;
            --transition: 0.25s ease;
            --font: 'Segoe UI', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 30% 50%, #f7931a08, transparent 60%);
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 32px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 24px;
            justify-content: center;
        }
        .logo span {
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 { text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: var(--muted); margin-bottom: 28px; font-size: 0.9rem; }
        .referral-badge {
            background: #f7931a15;
            border: 1px solid #f7931a40;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            color: var(--gold-light);
            font-size: 0.9rem;
        }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            background: #0a0a12;
            border: 1px solid var(--border);
            color: #fff;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 10px #f7931a30; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; min-width: 0; }
        .pin-group { display: flex; gap: 10px; }
        .pin-group input { text-align: center; font-size: 1.2rem; letter-spacing: 2px; }
        .profile-upload { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .profile-preview {
            width: 64px; height: 64px; border-radius: 50%;
            background: #1a1a2e; border: 2px dashed var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--muted); overflow: hidden; flex-shrink: 0;
        }
        .profile-preview img { width: 100%; height: 100%; object-fit: cover; }
        .upload-btn {
            padding: 8px 16px; border-radius: 50px;
            background: #1a1a2e; border: 1px solid var(--border);
            color: #fff; cursor: pointer; font-size: 0.85rem;
        }
        .auto-detect { color: var(--gold); font-size: 0.75rem; cursor: pointer; margin-left: 6px; }
        .btn {
            width: 100%; padding: 14px; border-radius: 50px; border: none;
            background: var(--grad); color: #0a0a0f; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 20px #f7931a30;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px #f7931a50; }
        .btn:disabled { opacity: 0.6; pointer-events: none; }
        .login-link { text-align: center; margin-top: 20px; color: var(--muted); font-size: 0.9rem; }
        .login-link a { color: var(--gold); text-decoration: none; font-weight: 600; }
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000000e0; z-index: 1000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .loading-overlay.active { opacity: 1; pointer-events: all; }
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid #f7931a30;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">⛏️ <span>BitVault</span></div>
        <h2>Start Mining Today</h2>
        <p class="sub">Create your account and begin earning</p>

        <!-- Referral notice (shown only if referral code present) -->
        <div class="referral-badge" id="referralNotice" style="display: none;">
            🎉 You were invited! Register now and your friend will earn a bonus.
        </div>

        <form id="registerForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="fullName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Phone Number (WhatsApp) *</label>
                <input type="tel" name="phone" placeholder="+1234567890" required>
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Full Address <span class="auto-detect" onclick="detectLocation()">📍 Auto-detect</span></label>
                <div class="row">
                    <input type="text" name="country" id="country" placeholder="Country" required>
                    <input type="text" name="region" id="region" placeholder="State/Region" required>
                </div>
                <div class="row" style="margin-top:8px;">
                    <input type="text" name="city" id="city" placeholder="City" required>
                    <input type="text" name="street" id="street" placeholder="Street">
                </div>
            </div>
            <div class="form-group">
                <label>Profile Picture (clear face)</label>
                <div class="profile-upload">
                    <div class="profile-preview" id="profilePreview">👤</div>
                    <label class="upload-btn">
                        📁 Choose Photo
                        <input type="file" name="profilePic" accept="image/*" style="display:none;" id="profilePicInput" onchange="previewProfile(event)">
                    </label>
                </div>
                <small style="color:var(--muted);">Make sure your face is clearly visible</small>
            </div>
            <div class="form-group">
                <label>Create 6‑Digit PIN *</label>
                <div class="pin-group">
                    <input type="password" name="pin" maxlength="6" minlength="6" pattern="\d{6}" placeholder="******" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                </div>
            </div>
            <div class="form-group">
                <label>Confirm PIN *</label>
                <div class="pin-group">
                    <input type="password" name="confirmPin" maxlength="6" minlength="6" pattern="\d{6}" placeholder="******" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                </div>
            </div>
            <button type="submit" class="btn" id="registerBtn">Register & Start Mining</button>
        </form>
        <div class="login-link">Already have an account? <a href="login.html">Login here</a></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Creating your mining profile…</div>
        <div class="loading-text" style="font-size:0.9rem; color:var(--gold-light);" id="countdownText"></div>
    </div>

    <script>
        // ---------- Referral capture ----------
        const urlParams = new URLSearchParams(window.location.search);
        const referralCode = urlParams.get('ref');
        if (referralCode) {
            document.getElementById('referralNotice').style.display = 'block';
            // Store for later submission
            sessionStorage.setItem('refCode', referralCode);
        }

        async function detectLocation() {
            try {
                document.getElementById('country').placeholder = 'Detecting…';
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data.country_name) document.getElementById('country').value = data.country_name;
                if (data.region) document.getElementById('region').value = data.region;
                if (data.city) document.getElementById('city').value = data.city;
            } catch (e) {
                alert('Could not auto-detect location. Please fill manually.');
            }
        }

        function previewProfile(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('profilePreview');
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { preview.innerHTML = `<img src="${e.target.result}" alt="Profile">`; };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const pin = form.pin.value;
            const confirm = form.confirmPin.value;

            if (pin.length !== 6) return alert('PIN must be exactly 6 digits.');
            if (pin !== confirm) return alert('PINs do not match.');

            // Show loading
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('active');
            const countdownEl = document.getElementById('countdownText');
            let sec = 5;
            countdownEl.textContent = `Setting up your account… ${sec}s`;
            const interval = setInterval(() => {
                sec--;
                if (sec >= 0) countdownEl.textContent = `Setting up your account… ${sec}s`;
                if (sec === 0) clearInterval(interval);
            }, 1000);

            // Wait 5 seconds
            await new Promise(resolve => setTimeout(resolve, 5000));

            try {
                const formData = new FormData(form);
                formData.delete('confirmPin');

                // Append referral code if it exists
                const ref = sessionStorage.getItem('refCode');
                if (ref) formData.append('ref', ref);

                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('minerUser', JSON.stringify(result.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(result.message || 'Registration failed.');
                    overlay.classList.remove('active');
                    clearInterval(interval);
                }
            } catch (err) {
                alert('Server error. Please try again.');
                overlay.classList.remove('active');
                clearInterval(interval);
            }
        });
    </script>
</body>
</html>
